interface:
  display_name: "Property Advisor"
  short_description: "OpenClaw-first property orchestration with OK/GT routing and bundled map enrichment"
  default_prompt: "Use this skill for any housing or property request involving search, filtering, comparison, commute, amenities, area fit, neighborhood risk, or publishing a property listing. This is an execution-layer skill. For search: route to ok-core-skill or gt-core-skill, preflight, fetch listings, hydrate details, explicitly call bundled public-osm-map-context-skill, and return the fixed candidate table. For publishing: use this skill's CLI-generated title/description and readiness report; do not freehand listing copy. If the property is in the UK, route publishing to gt-core-skill publish-listing; otherwise use ok-core-skill publish-property. If location/address/postcode exists, call bundled map context and only use user-provided facts plus map assessments. Never invent landmarks, building amenities, pet policy, security, wardrobes, gym/pool, or transit claims."
